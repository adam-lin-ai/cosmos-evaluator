av.obstacle:
  enabled: true
  importance_filter:
    allow_all_static_objects: true
    distance_threshold_m: 100
    relevant_lanes:
      - ego
      - left
      - right
    skip_oncoming_obstacles: false

  overlap_check:
    crosswalk:
      method: ratio
    lane_line:
      method: ratio
    motorcycle:
      method: cluster
    pedestrian:
      method: cluster
    road_boundary:
      method: ratio
    traffic_light:
      method: ratio
    traffic_sign:
      method: ratio
    vehicle:
      method: ratio
    wait_line:
      method: ratio

  hallucination_detector:
    enabled: true
    classes:
      bicycle:
        min_cluster_area: 2000
      motorcycle:
        min_cluster_area: 3000
      pedestrian:
        min_cluster_area: 1000
      traffic_light:
        min_cluster_area: 1000
      traffic_sign:
        min_cluster_area: 1000
      vehicle:
        min_cluster_area: 5000
    max_cluster_per_frame: 100

  visualization:
    enabled: true

av.vlm:
  enabled: true
  preset_check:
    enabled: true
    keyframe_interval_s: 2.0
    keyframe_width: 640
    model:
      endpoint: qwen3.5-397b-a17b
      temperature: 0.0
    timeout_seconds: 90

metropolis.hallucination:
  enabled: true
  blur_ksize: 7
  dist_tol_px: 7.0
  grad_thresh: 10.0
  morph_k: 3
  threshold: 0.682
  # max_frames: 1000

metropolis.attribute_verification:
  enabled: true
  selected_variables:
    weather: sunny
    time_of_day: morning
  variable_options:
    weather:
      - sunny
      - cloudy
      - rainy
      - snowy
    time_of_day:
      - morning
      - night
  question_generation:
    llm:
      endpoint: "https://integrate.api.nvidia.com/v1"
      model: "qwen/qwen3-next-80b-a3b-instruct"
    parameters:
      frequency_penalty: 0.0
      max_tokens: 2048
      presence_penalty: 0.0
      retry: 1
      stream: true
      temperature: 0.2
      top_p: 0.95
    system_prompt: "You are an expert at creating multiple choice verification questions.\
      \ \nYour task is to generate a simple, direct question that can verify a specific\
      \ attribute in a video frame.\nThe question must have 2-4 answer options and\
      \ test for a specific visual attribute.\nThe question should be answerable by\
      \ looking at a single frame from the video.\nOutput your response as a single\
      \ JSON object with no additional text or formatting.\n"
  vlm_verification:
    vlm:
      endpoint: "https://integrate.api.nvidia.com/v1"
      model: "qwen/qwen3.5-397b-a17b"
    parameters:
      frequency_penalty: 0.0
      max_tokens: 10
      retry: 1
      stream: false
      temperature: 0.0
      top_p: 1.0
    system_prompt: 'You are an expert vision model tasked with answering multiple
      choice questions about images.

      Analyze the image carefully and select the single best answer from the provided
      options.

      Respond with ONLY a single letter (A, B, C, or D) corresponding to your answer.

      Do not include any explanation or additional text.

      '
